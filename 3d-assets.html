<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Keari 3D Assets</title>
<link rel="stylesheet" href="style.css">
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>

<body>

<div class="sidebar">
    <h2><a href="index.html" class="home-link">Keari's File Archive</a></h2>
    <a href="assets.html">Assets</a>
    <a href="3d-assets.html">3D Assets</a>
</div>

<div class="content">
    <h1>3D Assets</h1>

    <div id="assetList"></div>
</div>

<script>
fetch("3d-assets.json")
.then(res => res.json())
.then(data => {
    const container = document.getElementById("assetList");

    data.assets.forEach(asset => {
        const card = document.createElement("div");
        card.className = "asset-card";

        card.innerHTML = `
        <model-viewer class="model-viewer"
            src="models/${asset.file}"
            camera-controls
            auto-rotate
            shadow-intensity="1">
        </model-viewer>

        <h3>${asset.name}</h3>
        <p>${asset.description}</p>
        <div class="asset-size">${asset.size}</div>
        <a class="download" href="models/${asset.file}" download>Download</a>
        `;

        container.appendChild(card);
    });
});
</script>

</body>
</html>
